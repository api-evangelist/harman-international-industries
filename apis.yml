aid: harman-international-industries
name: Harman International
description: >-
  Harman International, a wholly-owned subsidiary of Samsung Electronics, is a
  global leader in connected technologies for automotive, consumer, and
  enterprise markets, including connected car systems, audio products, professional
  solutions, and connected services. Harman does not currently publish a public
  developer portal or open APIs; integrations with Harman platforms (such as Ignite,
  Ready Connect, and audio brands like JBL, Harman Kardon, and AKG) are typically
  delivered through commercial partnerships and OEM agreements.
